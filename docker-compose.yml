# =============================================================================
# EDULEARN PRO / Naya Wallah Kanoon — Docker Compose (SQLite, single container)
# =============================================================================
# This project uses SQLite (file-based) for both development and production.
# PostgreSQL is NOT required. The database file is persisted via a volume.
#
# Usage:
#   export JWT_ACCESS_SECRET=$(openssl rand -base64 32)
#   export JWT_REFRESH_SECRET=$(openssl rand -base64 32)
#   docker-compose up -d --build
#
# Run seed (first time only):
#   docker-compose exec app bun run scripts/seed.ts
# =============================================================================

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nwk-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # SQLite database (file-based, no external DB needed)
      DATABASE_URL: "file:/app/data/custom.db"

      # Auth secrets (MUST be set — no fallbacks in production)
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}

      # App config
      NODE_ENV: production
      APP_URL: ${APP_URL:-http://localhost:3000}

      # Admin bootstrap
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@nayawallahkanoon.com}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-Admin@12345}
      ADMIN_NAME: ${ADMIN_NAME:-Adv. Akash Faujdar}

      # Feature flags
      FEATURE_CERTIFICATES: ${FEATURE_CERTIFICATES:-false}
      FEATURE_REVENUE: ${FEATURE_REVENUE:-false}
    volumes:
      # Persist SQLite database file
      - dbdata:/app/data
      # Persist uploaded files (if any module uses local storage)
      - uploads:/app/private-uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  dbdata:
    driver: local
  uploads:
    driver: local
