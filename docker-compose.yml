services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nwk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_DB: ${POSTGRES_DB:-nwk}
    volumes: ["pgdata:/var/lib/postgresql/data"]
    ports: ["${POSTGRES_PORT:-5432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nwk}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    user: "1001:1001"
    command: ["npx", "prisma", "migrate", "deploy"]
    environment: &app_environment
      DATABASE_URL: postgresql://${POSTGRES_USER:-nwk}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-nwk}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?required}
      REDIS_URL: redis://redis:6379
      APP_URL: ${APP_URL:?required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?required}
      TRUST_PROXY: "true"
      PROXY_SHARED_SECRET: ${PROXY_SHARED_SECRET:?required}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: "no"

  bootstrap-admin:
    build: .
    command: ["npm", "run", "db:bootstrap-admin"]
    environment:
      <<: *app_environment
      ADMIN_EMAILS: ${ADMIN_EMAILS:-${ADMIN_EMAIL}}
      ADMIN_NAME: ${ADMIN_NAME:-System Administrator}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?required}
    depends_on:
      migrate: { condition: service_completed_successfully }
    profiles: ["tools"]

  app:
    build: .
    restart: unless-stopped
    ports: ["${APP_PORT:-3000}:3000"]
    environment: *app_environment
    volumes: ["uploads:/app/private-uploads"]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

volumes:
  pgdata:
  uploads:
  redisdata:
