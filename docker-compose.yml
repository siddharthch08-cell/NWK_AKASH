services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redisdata:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    build: .
    user: "1001:1001"
    command: ["npx", "prisma", "migrate", "deploy"]
    environment: &app_environment
      DATABASE_URL: file:/app/data/custom.db
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?required}
      REDIS_URL: redis://redis:6379
      APP_URL: ${APP_URL:?required}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?required}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:?required}
      TRUST_PROXY: "true"
      PROXY_SHARED_SECRET: ${PROXY_SHARED_SECRET:?required}
    volumes: ["dbdata:/app/data"]
    depends_on:
      redis: { condition: service_healthy }
    restart: "no"

  bootstrap-admin:
    build: .
    command: ["npm", "run", "db:bootstrap-admin"]
    environment:
      <<: *app_environment
      ADMIN_EMAIL: ${ADMIN_EMAIL:?required}
      ADMIN_NAME: ${ADMIN_NAME:-System Administrator}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:?required}
    volumes: ["dbdata:/app/data"]
    depends_on:
      migrate: { condition: service_completed_successfully }
    profiles: ["tools"]

  app:
    build: .
    restart: unless-stopped
    ports: ["${APP_PORT:-3000}:3000"]
    environment: *app_environment
    volumes: ["dbdata:/app/data", "uploads:/app/private-uploads"]
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }

volumes:
  dbdata:
  uploads:
  redisdata:
